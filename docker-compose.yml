# ============================================
# 深象 OPCS - Docker Compose 生产部署
# 适用于阿里云 ECS（含本地 MySQL）
# ============================================
version: "3.9"

services:
  # --- MySQL 数据库 ---
  mysql:
    image: mysql:8.0
    container_name: opcs-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-OpcsMySQL2026!}
      MYSQL_DATABASE: opcs_production
      MYSQL_USER: opcs_admin
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-OpcsDB2026vip!}
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=512M
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-OpcsMySQL2026!}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - opcs-network
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # --- 应用服务 ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opcs-app
    restart: always
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=mysql://opcs_admin:${MYSQL_PASSWORD:-OpcsDB2026vip!}@mysql:3306/opcs_production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - opcs-network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # --- Redis 缓存 ---
  redis:
    image: redis:7-alpine
    container_name: opcs-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opcs-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- Nginx 反向代理 ---
  nginx:
    image: nginx:1.25-alpine
    container_name: opcs-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - opcs-network
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  nginx-logs:
    driver: local

networks:
  opcs-network:
    driver: bridge
